name: Deploy to Azure Function App

on:
  push:
    branches: [main, master]
    paths:
      - 'field-service-bot/app/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify imports
        run: |
          cd field-service-bot/app
          python -c "
          import py_compile
          py_compile.compile('bot.py', doraise=True)
          py_compile.compile('agent_bot.py', doraise=True)
          py_compile.compile('function_app.py', doraise=True)
          py_compile.compile('db.py', doraise=True)
          print('All files compile OK')"

      - name: Package for deployment
        run: |
          mkdir deploy_package
          cp field-service-bot/app/function_app.py    deploy_package/
          cp field-service-bot/app/bot.py             deploy_package/
          cp field-service-bot/app/agent_bot.py       deploy_package/
          cp field-service-bot/app/db.py              deploy_package/
          cp field-service-bot/app/persistence.py     deploy_package/
          cp field-service-bot/app/blob_storage.py    deploy_package/
          cp field-service-bot/app/host.json          deploy_package/
          cp field-service-bot/app/requirements.txt   deploy_package/

      - name: Deploy to Azure
        uses: Azure/functions-action@v1
        with:
          app-name: guc-field-service-func
          package: deploy_package
          sku: linux
